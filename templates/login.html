<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — FaceAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/auth.css">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
<div class="wrap">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round">
        <path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M21 3h-4"/>
        <path d="M21 9V5a2 2 0 0 0-2-2"/><path d="M3 15v4a2 2 0 0 0 2 2h4"/>
        <path d="M15 21h4a2 2 0 0 0 2-2v-4"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div class="logo-name">FaceAttend</div>
    <div class="logo-sub">Hệ thống chấm công thông minh</div>
  </div>

  <div class="card">
    <!-- Step tabs -->
    <div class="step-tabs">
      <div class="stab active" id="tab1">① Thông tin</div>
      <div class="stab" id="tab2">② Xác nhận OTP</div>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"><span class="alert-icon"></span><span id="alertMsg"></span></div>

    <!-- ── STEP 1: Email + Password ── -->
    <div id="step1">
      <div class="fg">
        <label class="fl">Email</label>
        <input class="fi" id="email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="fg">
        <label class="fl">Mật khẩu</label>
        <div class="fi-icon">
          <input class="fi" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
          <span class="eye" id="eyeBtn" onclick="togglePwd()">👁</span>
        </div>
      </div>
      <button class="btn btn-t" id="btnLogin" onclick="doLogin()">
        Đăng nhập
      </button>
      <div class="aux">
        Chưa có tài khoản? <a href="/auth/register-page">Đăng ký ngay</a>
      </div>
    </div>

    <!-- ── STEP 2: OTP ── -->
    <div id="step2" style="display:none">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Mã OTP đã gửi tới</div>
        <div style="font-weight:700;color:var(--text)" id="otpEmail">—</div>
      </div>

      <div class="otp-row">
        <input class="otp-box" id="o0" maxlength="1" inputmode="numeric">
        <input class="otp-box" id="o1" maxlength="1" inputmode="numeric">
        <input class="otp-box" id="o2" maxlength="1" inputmode="numeric">
        <input class="otp-box" id="o3" maxlength="1" inputmode="numeric">
        <input class="otp-box" id="o4" maxlength="1" inputmode="numeric">
        <input class="otp-box" id="o5" maxlength="1" inputmode="numeric">
      </div>

      <div class="otp-timer">
        Hết hạn sau <span id="timerEl">10:00</span> &nbsp;|&nbsp;
        <span class="otp-resend" id="resendBtn" onclick="resendOTP()">Gửi lại OTP</span>
      </div>

      <button class="btn btn-t" id="btnVerify" onclick="doVerifyOTP()">
        Xác nhận & Đăng nhập
      </button>
      <button class="btn btn-o" onclick="backToStep1()">← Quay lại</button>
    </div>
  </div>
</div>

<script>
let currentEmail = '';
let timerInterval = null;

// ── Keydown Enter ──
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  const s1 = document.getElementById('step1');
  if(s1.style.display !== 'none') doLogin();
  else doVerifyOTP();
});

// ── Password toggle ──
function togglePwd(){
  const f = document.getElementById('password');
  f.type = f.type === 'password' ? 'text' : 'password';
  document.getElementById('eyeBtn').textContent = f.type === 'password' ? '👁' : '🙈';
}

// ── Alert ──
function showAlert(msg, type='err'){
  const el = document.getElementById('alert');
  const icon = type==='ok'?'✓':type==='info'?'ℹ':'✕';
  document.getElementById('alertMsg').textContent = msg;
  document.querySelector('.alert-icon').textContent = icon;
  el.className = 'alert show '+type;
}
function clearAlert(){ document.getElementById('alert').className='alert'; }

// ── Step 1: Login ──
async function doLogin(){
  clearAlert();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email){ showAlert('Vui lòng nhập email'); return; }
  if(!password){ showAlert('Vui lòng nhập mật khẩu'); return; }

  const btn = document.getElementById('btnLogin');
  btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

  try{
    const res  = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'Lỗi đăng nhập');

    currentEmail = email;
    goToStep2();
  }catch(e){
    showAlert(e.message);
  }finally{
    btn.innerHTML = 'Đăng nhập'; btn.disabled = false;
  }
}

// ── Go to step 2 ──
function goToStep2(){
  clearAlert();
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = '';
  document.getElementById('tab1').className = 'stab done';
  document.getElementById('tab2').className = 'stab active';
  document.getElementById('otpEmail').textContent = currentEmail;
  setupOTPBoxes();
  startTimer(10 * 60);
  document.getElementById('o0').focus();
  showAlert('Mã OTP đã gửi tới email của bạn. Kiểm tra hộp thư.', 'info');
}

function backToStep1(){
  clearTimer();clearAlert();
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = '';
  document.getElementById('tab1').className = 'stab active';
  document.getElementById('tab2').className = 'stab';
  resetOTP();
}

// ── OTP boxes ──
function setupOTPBoxes(){
  for(let i=0;i<6;i++){
    const box = document.getElementById('o'+i);
    box.value = ''; box.className = 'otp-box';
    box.addEventListener('input', ()=>onOTPInput(i));
    box.addEventListener('keydown', e=>onOTPKey(e,i));
    box.addEventListener('paste', onOTPPaste);
  }
}

function onOTPInput(i){
  const box = document.getElementById('o'+i);
  const val = box.value.replace(/\D/g,'');
  box.value = val.slice(-1);
  if(val){ box.classList.add('filled'); if(i<5) document.getElementById('o'+(i+1)).focus(); }
  else    { box.classList.remove('filled'); }
  if(getOTP().length===6) setTimeout(doVerifyOTP, 100);
}

function onOTPKey(e,i){
  if(e.key==='Backspace' && !document.getElementById('o'+i).value && i>0)
    document.getElementById('o'+(i-1)).focus();
  if(e.key==='ArrowLeft' && i>0) document.getElementById('o'+(i-1)).focus();
  if(e.key==='ArrowRight' && i<5) document.getElementById('o'+(i+1)).focus();
}

function onOTPPaste(e){
  const txt = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
  if(!txt) return; e.preventDefault();
  [...txt.slice(0,6)].forEach((c,i)=>{
    const box=document.getElementById('o'+i);if(!box)return;
    box.value=c;box.classList.add('filled');
  });
  const next=Math.min(txt.length,5);
  document.getElementById('o'+next).focus();
  if(txt.length>=6) setTimeout(doVerifyOTP,100);
}

function getOTP(){ return Array.from({length:6},(_,i)=>document.getElementById('o'+i).value).join(''); }

function resetOTP(){
  for(let i=0;i<6;i++){
    const b=document.getElementById('o'+i);if(b){b.value='';b.className='otp-box';}
  }
}

// ── Timer ──
function startTimer(seconds){
  clearTimer();
  let rem = seconds;
  const el = document.getElementById('timerEl');
  const resend = document.getElementById('resendBtn');
  resend.classList.remove('show');

  timerInterval = setInterval(()=>{
    rem--;
    const m = String(Math.floor(rem/60)).padStart(2,'0');
    const s = String(rem%60).padStart(2,'0');
    el.textContent = `${m}:${s}`;
    if(rem<=0){ clearTimer(); el.textContent='Hết hạn'; resend.classList.add('show'); }
  },1000);
}
function clearTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

async function resendOTP(){
  document.getElementById('resendBtn').classList.remove('show');
  clearAlert();
  try{
    const res  = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:currentEmail, password: document.getElementById('password').value})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail);
    resetOTP();startTimer(10*60);
    showAlert('Đã gửi lại OTP mới. Kiểm tra hộp thư!','ok');
    document.getElementById('o0').focus();
  }catch(e){ showAlert(e.message); document.getElementById('resendBtn').classList.add('show'); }
}

// ── Step 2: Verify OTP ──
async function doVerifyOTP(){
  clearAlert();
  const otp = getOTP();
  if(otp.length < 6){ showAlert('Vui lòng nhập đủ 6 chữ số'); return; }

  const btn = document.getElementById('btnVerify');
  btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

  try{
    const res  = await fetch('/auth/login/verify-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:currentEmail, otp})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'OTP không đúng');

    // Lưu tokens
    localStorage.setItem('access_token',  data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    localStorage.setItem('user', JSON.stringify(data.user));

    clearTimer();
    // Redirect theo role
    const role = data.user?.role;
    window.location.href = (role==='admin'||role==='manager') ? '/dashboard' : '/';
  }catch(e){
    // Shake OTP boxes
    for(let i=0;i<6;i++) document.getElementById('o'+i).classList.add('err');
    setTimeout(()=>{ for(let i=0;i<6;i++) document.getElementById('o'+i).classList.remove('err'); },500);
    resetOTP(); document.getElementById('o0').focus();
    showAlert(e.message);
  }finally{
    btn.innerHTML = 'Xác nhận & Đăng nhập'; btn.disabled = false;
  }
}

// ── Check nếu đã đăng nhập ──
(function(){
  const token = localStorage.getItem('access_token');
  if(token){
    // Thử verify token — nếu còn hợp lệ thì redirect
    fetch('/auth/me', {headers:{Authorization:'Bearer '+token}})
      .then(r=>r.json())
      .then(d=>{ if(d.user){ const role=d.user.role; window.location.href=(role==='admin'||role==='manager')?'/dashboard':'/'; } })
      .catch(()=>{});
  }
})();
</script>
</body>
</html>
